services:
  - type: web
    name: piston-api
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./api/Dockerfile
    ports:
      - port: 2000
        protocol: TCP
    env:
      - key: PORT
        value: 2000
      - key: PISTON_LOG_LEVEL
        value: INFO
      - key: PISTON_DATA_DIRECTORY
        value: /piston
    rootDir: .
    buildCommand: ""
    startCommand: "/piston_api/src/docker-entrypoint.sh"
    healthCheckPath: /
    healthCheckInterval: 30
    autoDeploy: true
