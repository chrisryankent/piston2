services:
  - type: web
    name: piston-api
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./api/Dockerfile
    envVars:
      - key: PORT
        value: 2000
      - key: PISTON_LOG_LEVEL
        value: INFO
      - key: PISTON_DATA_DIRECTORY
        value: /piston
    autoDeploy: true
